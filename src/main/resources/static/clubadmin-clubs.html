<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Club Discovery | Scholar Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21417f",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#444650",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #191c1d; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .primary-gradient { background: linear-gradient(135deg, #21417f 0%, #3b5998 100%); }
    </style>
</head>
<body class="bg-surface text-on-surface">
<!-- TopNavBar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-50 h-16 flex items-center shadow-sm">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
        <div class="flex items-center gap-12">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='clubadmin-dashboard.html'">
                <img src="assets/images/logo.png" alt="Scholar Hub" class="h-8 md:h-10" data-flip-id="app-logo">
            </div>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-semibold">
                <a class="text-slate-500 hover:text-primary transition-colors" href="clubadmin-dashboard.html">Dashboard</a>
                <a class="text-slate-500 hover:text-primary transition-colors" href="clubadmin-myclub.html">My Club</a>
                <a class="text-slate-500 hover:text-primary transition-colors" href="clubadmin-events.html">Events</a>
                <a class="text-primary border-b-2 border-primary pb-1 font-bold" href="clubadmin-clubs.html">Clubs</a>
                <a class="text-slate-500 hover:text-primary transition-colors" href="clubadmin-venue.html">Venues</a>
                <a class="text-slate-500 hover:text-primary transition-colors" href="clubadmin-feedback.html">Feedback</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="relative p-1 text-slate-500 hover:text-primary transition-colors">
                <span class="material-symbols-outlined align-middle" style="font-variation-settings: 'FILL' 1">notifications</span>
            </button>
            <div class="flex items-center gap-3 pl-3 border-l border-slate-200 relative cursor-pointer group" onclick="document.getElementById('profileDropdown').classList.toggle('hidden')">
                <div class="h-9 w-9 rounded-full overflow-hidden border border-slate-200 bg-slate-100 flex items-center justify-center" data-flip-id="user-profile">
                    <span class="material-symbols-outlined text-slate-500">person</span>
                </div>
                <span id="userName" class="text-sm font-semibold text-slate-700 hidden lg:block">Club Admin</span>
                <span class="material-symbols-outlined text-sm text-slate-400">expand_more</span>
                
                <div id="profileDropdown" class="hidden absolute top-full right-0 mt-4 w-48 bg-white rounded-xl shadow-lg border border-slate-200 py-2 z-50">
                    <a href="profile.html" class="flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                        <span class="material-symbols-outlined text-[18px]">person</span>
                        My Profile
                    </a>
                    <div class="h-[1px] bg-slate-100 my-1 mx-2"></div>
                    <a href="#" onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-sm text-error hover:bg-error/5 transition-colors font-semibold">
                        <span class="material-symbols-outlined text-[18px]">logout</span>
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 pt-12 pb-24 motion-fade-scale">
    <header class="flex flex-col space-y-8 mb-16">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div class="space-y-2">
                <h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight">Discover Your Community</h1>
                <p class="text-on-surface-variant font-body text-lg">Manage and discover 100+ active student organizations across the campus.</p>
            </div>
            <button onclick="window.location.href='clubadmin-newclub.html'" class="bg-primary text-white px-8 py-3.5 rounded-2xl font-bold font-headline flex items-center gap-3 shadow-xl shadow-primary/20 hover:scale-105 active:scale-95 transition-all magnetic-btn">
                <span class="material-symbols-outlined font-bold">add_circle</span>
                Create New Club
            </button>
        </div>
        <div class="flex flex-col lg:flex-row items-center gap-6 w-full">
            <div class="w-full lg:max-w-md relative group">
                <span class="material-symbols-outlined absolute left-4 inset-y-0 flex items-center text-slate-400">search</span>
                <input id="clubSearch" class="w-full pl-12 pr-4 py-3.5 bg-white rounded-xl border-none focus:ring-2 focus:ring-primary/20 shadow-sm text-on-surface" placeholder="Search by name, interest or mission..." type="text"/>
            </div>
            <div id="categoryTabs" class="flex items-center gap-3 overflow-x-auto no-scrollbar w-full lg:w-auto py-2">
                <button class="tab-btn px-6 py-2 rounded-full bg-primary text-white font-medium text-sm transition-all shadow-md" data-category="">All</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container-highest transition-all" data-category="Academic">Academic</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container-highest transition-all" data-category="Technology">Technology</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container-highest transition-all" data-category="Arts">Arts</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container-highest transition-all" data-category="Service">Service</button>
            </div>
        </div>
    </header>

    <section id="clubGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Data populated via JS -->
         <p class="text-slate-500">Loading clubs...</p>
    </section>
</main>

<script>
    let allClubs = [];
    let activeCategory = "";
    let pollingInterval = null;

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    async function loadClubs() {
        try {
            const resp = await fetch(`/api/clubs/admin/approved?t=${Date.now()}`);
            allClubs = await resp.json();
            filterClubs(); // Maintain filter on update
        } catch (e) {
            console.error("Failed to load clubs", e);
        }
    }

    function renderClubs(clubs) {
        const grid = document.getElementById('clubGrid');
        grid.innerHTML = '';
        
        const user = JSON.parse(localStorage.getItem('user'));

        if (clubs.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No clubs found.</p>';
            return;
        }

        clubs.forEach(club => {
            const isMyClub = user && user.role === 'CLUB_ADMIN' && club.presidentEmail === user.email;
            const profileUrl = isMyClub ? `clubadmin-myclub.html?clubId=${club.id}` : `student-viewclubdetails.html?id=${club.id}`;
            
            const card = `
                <div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm flex flex-col justify-between group hover:-translate-y-1 transition-transform duration-300">
                    <div class="space-y-6">
                        <div class="flex justify-between items-start">
                            <div class="w-16 h-16 rounded-xl bg-slate-100 flex items-center justify-center overflow-hidden">
                                <img src="${club.logoUrl || 'https://images.unsplash.com/photo-1540575861501-7ad05823c94b?auto=format&fit=crop&q=80&w=2070'}" alt="${club.name}" class="w-full h-full object-cover">
                            </div>
                            <span class="px-3 py-1 rounded-full bg-secondary-container text-on-secondary-container text-[0.6875rem] font-bold uppercase tracking-wider">${club.category || 'Development'}</span>
                        </div>
                        <div>
                            <h3 class="font-headline text-xl font-bold text-on-surface mb-2">${club.name}</h3>
                            <p class="text-on-surface-variant text-sm line-clamp-2 leading-relaxed">${club.description}</p>
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 text-sm">
                            <span class="material-symbols-outlined text-sm">groups</span>
                            <span class="font-medium">Active Member Program</span>
                        </div>
                    </div>
                    <div class="grid ${isMyClub ? 'grid-cols-1' : 'grid-cols-2'} gap-3 mt-8">
                        <button onclick="window.location.href='${profileUrl}'" class="py-2.5 px-4 rounded-lg border border-slate-200 text-primary font-bold text-sm hover:bg-slate-50 transition-colors">
                            ${isMyClub ? '<span class="flex items-center justify-center gap-1.5"><span class="material-symbols-outlined text-sm">admin_panel_settings</span>Manage Club</span>' : 'Profile'}
                        </button>
                        ${isMyClub ? '' : `<button onclick="window.location.href='student-joinclubform.html?id=${club.id}'" class="py-2.5 px-4 rounded-lg primary-gradient text-white font-bold text-sm shadow-md hover:opacity-95">Join Club</button>`}
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function filterClubs() {
        const search = document.getElementById('clubSearch').value.toLowerCase();
        const filtered = allClubs.filter(club => {
            const matchesSearch = (club.name && club.name.toLowerCase().includes(search)) || 
                               (club.description && club.description.toLowerCase().includes(search));
            const matchesCategory = activeCategory === "" || (club.category && club.category === activeCategory);
            return matchesSearch && matchesCategory;
        });
        renderClubs(filtered);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadClubs();
        pollingInterval = setInterval(loadClubs, 15000); // Poll every 15s
        
        document.getElementById('clubSearch').addEventListener('input', filterClubs);
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-primary', 'text-white', 'shadow-md'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('bg-surface-container-high', 'text-on-surface-variant'));
                
                btn.classList.add('bg-primary', 'text-white', 'shadow-md');
                btn.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                
                activeCategory = btn.getAttribute('data-category');
                filterClubs();
            });
        });
    });
</script>
    <script src="assets/js/transitions.js"></script>
</body></html>
